name: Monthly MCT update

on:
  # Wednesdays at 02:30 UTC ≈ 12:30 AEST (13:30 AEDT during summer).
  # ABS publishes the Monthly CPI at 11:30 Canberra time on the last Wednesday
  # of each month. The "last Wednesday" gate below skips other Wednesdays.
  schedule:
    - cron: "30 2 * * 3"
  workflow_dispatch:
    inputs:
      force:
        description: "Force-run even if today isn't the last Wednesday"
        required: false
        type: boolean
        default: false

jobs:
  fit-and-publish:
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest is 4 vCPU / 16 GB. Production model is
    # Variant B (RW common trend) fit by the in-house Gibbs sampler on the
    # 33-sub-group quarterly panel. Wall time is ~4-5 min on M1; budget
    # ~15-20 min on the slower x86 runner, plus ~5 min for R setup and
    # ~2 min for the Quarto render. No CmdStan needed any more — the
    # earlier Stan-based pipeline (timeout 300 min) is in
    # outputs/draws/legacy_11group/ for reference.
    timeout-minutes: 60

    permissions:
      contents: write    # for the gh-pages deploy

    steps:
      # ------------------------------------------------------------------ Gate
      - name: Determine whether to run
        id: gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ inputs.force }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — running."
            exit 0
          fi
          # On a cron Wednesday: only proceed if next week's same weekday is in
          # a different month (i.e., today is the LAST Wednesday of the month).
          today_month=$(date -u +%m)
          next_month=$(date -u -d "+7 days" +%m)
          if [[ "$today_month" != "$next_month" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Last Wednesday of $today_month — running."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not the last Wednesday of the month — skipping."
          fi

      # --------------------------------------------------------------- Sources
      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - name: Set up R
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Set up Pandoc (Quarto rendering dep)
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Quarto
        if: steps.gate.outputs.run == 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.4.557"

      # ---------------------------------------------------------------- Caches
      - name: Cache targets store + fits
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            _targets
            outputs/draws
          key: ${{ runner.os }}-targets-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-targets-

      # -------------------------------------------------------- R dependencies
      # setup-r-dependencies reads DESCRIPTION Imports/Suggests automatically.
      # No CmdStan needed any more — the production sampler is the in-house
      # Gibbs implementation in R/gibbs/, which has only base-R + MASS as
      # runtime deps.
      - name: Install R packages
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2

      # ----------------------------------------------------------- Rotate fits
      # Promote last run's `fit_B.rds` to `_prior.rds` so the dashboard's
      # revisions + revision-attribution panels have a prior vintage to
      # compare against.
      - name: Rotate prior vintage
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          mkdir -p outputs/draws
          if [[ -f outputs/draws/fit_B.rds ]]; then
            cp outputs/draws/fit_B.rds      outputs/draws/fit_B_prior.rds
            cp outputs/draws/stan_data.rds  outputs/draws/stan_data_prior.rds
            echo "Rotated fit_B.rds -> fit_B_prior.rds"
          else
            echo "No previous fit_B.rds — revisions panel will be empty this run."
          fi

      # ----------------------------------------------------------------- Build
      - name: Run targets pipeline
        if: steps.gate.outputs.run == 'true'
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          targets::tar_make()

      - name: Verify dashboard build artefacts
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          # tar_quarto(dashboard, ...) above already rendered the site to
          # dashboard/_site/. Confirm index.html exists for the publish step.
          ls -la dashboard/_site/
          test -f dashboard/_site/index.html

      # ----------------------------------------------------------------- Deploy
      - name: Publish dashboard
        if: steps.gate.outputs.run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard/_site
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Dashboard update for ${{ github.run_id }}"

      # ------------------------------------------------------ Persist fits
      - name: Upload fit_B as workflow artefact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mct-fits-${{ github.run_id }}
          path: |
            outputs/draws/fit_B.rds
            outputs/draws/fit_B_prior.rds
            outputs/draws/stan_data.rds
            outputs/draws/stan_data_prior.rds
          retention-days: 90
          if-no-files-found: ignore
