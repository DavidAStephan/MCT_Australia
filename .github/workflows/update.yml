name: Monthly MCT update

on:
  # Wednesdays at 02:30 UTC ≈ 12:30 AEST (13:30 AEDT during summer).
  # ABS publishes the Monthly CPI at 11:30 Canberra time on the last Wednesday
  # of each month. The "last Wednesday" gate below skips other Wednesdays.
  schedule:
    - cron: "30 2 * * 3"
  workflow_dispatch:
    inputs:
      force:
        description: "Force-run even if today isn't the last Wednesday"
        required: false
        type: boolean
        default: false

jobs:
  fit-and-publish:
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest is 4 vCPU / 16 GB. Cron path refits only
    # Variant A (~93 min on M1; budget ~3 h on the slower x86 runner, plus
    # ~30 min for setup/cmdstan/render). Variants B and C exceed the 350-min
    # cap on a free runner, so they're left to manual local builds. To run
    # the full three-variant pipeline here, use a self-hosted M1 runner or
    # a paid larger runner and replace the "A only" target list in the
    # tar_make() call below with a bare tar_make().
    timeout-minutes: 300

    permissions:
      contents: write    # for the gh-pages deploy

    steps:
      # ------------------------------------------------------------------ Gate
      - name: Determine whether to run
        id: gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ inputs.force }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — running."
            exit 0
          fi
          # On a cron Wednesday: only proceed if next week's same weekday is in
          # a different month (i.e., today is the LAST Wednesday of the month).
          today_month=$(date -u +%m)
          next_month=$(date -u -d "+7 days" +%m)
          if [[ "$today_month" != "$next_month" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Last Wednesday of $today_month — running."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not the last Wednesday of the month — skipping."
          fi

      # --------------------------------------------------------------- Sources
      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - name: Set up R
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Set up Pandoc (Quarto rendering dep)
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Quarto
        if: steps.gate.outputs.run == 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.4.557"

      # ---------------------------------------------------------------- Caches
      - name: Cache CmdStan
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: ${{ runner.os }}-cmdstan-2.36.0
          restore-keys: ${{ runner.os }}-cmdstan-

      - name: Cache targets store + fits
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            _targets
            outputs/draws
          key: ${{ runner.os }}-targets-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-targets-

      # -------------------------------------------------------- R dependencies
      # setup-r-dependencies reads DESCRIPTION Imports/Suggests automatically.
      # cmdstanr is not on CRAN; install from GitHub (stan-dev/cmdstanr) —
      # pak resolves the `owner/repo` shorthand natively.
      - name: Install R packages
        if: steps.gate.outputs.run == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            stan-dev/cmdstanr@v0.9.0

      - name: Install CmdStan
        if: steps.gate.outputs.run == 'true'
        shell: Rscript {0}
        run: |
          ver <- tryCatch(cmdstanr::cmdstan_version(),
                          error = function(e) NULL,
                          warning = function(w) NULL)
          if (is.null(ver) || length(ver) == 0L || is.na(ver)) {
            cat("No cached CmdStan found - installing.\n")
            cmdstanr::install_cmdstan(cores = 2)
          } else {
            cat("Using cached CmdStan", as.character(ver), "\n")
          }

      # ----------------------------------------------------------- Rotate fits
      # Promote last run's `fit_A.rds` to `_prior.rds` so the dashboard's
      # revisions + revision-attribution panels have a prior vintage to
      # compare against. (A is the headline post-LOO; the dashboard's
      # `posterior_revisions(fit_A, fit_A_prior, ...)` chunk reads these.)
      - name: Rotate prior vintage
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          mkdir -p outputs/draws
          if [[ -f outputs/draws/fit_A.rds ]]; then
            cp outputs/draws/fit_A.rds      outputs/draws/fit_A_prior.rds
            cp outputs/draws/stan_data.rds  outputs/draws/stan_data_prior.rds
            echo "Rotated fit_A.rds -> fit_A_prior.rds"
          else
            echo "No previous fit_A.rds — revisions panel will be empty this run."
          fi

      # ----------------------------------------------------------------- Build
      # Cron path: only refit Variant A (B and C exceed the 350-min runner
      # budget — see workflow header comment). The full three-variant
      # dashboard is built locally by the maintainer when needed.
      - name: Run targets pipeline (Variant A only)
        if: steps.gate.outputs.run == 'true'
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          # Refit A and only the A-side derived targets needed by the
          # A-only dashboard. fit_B and fit_C are intentionally skipped.
          targets::tar_make(c("stan_data", "fit_A",
                              "trend_A", "common_share_A",
                              "sector_contribs_A", "loo_A"))
          # fit_A is a format = "file" target — value is the absolute path.
          fit_A <- readRDS(targets::tar_read_raw("fit_A"))
          diag <- fit_A$diagnostic_summary()
          cat(sprintf("[A] divergent=%d  max_treedepth=%d\n",
                      sum(diag$num_divergent),
                      sum(diag$num_max_treedepth)))

      - name: Render A-only dashboard
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          quarto render dashboard/index_a_only.qmd
          # Standardise output to dashboard/_site/index.html for the publish step
          mkdir -p dashboard/_site
          if [[ -f dashboard/index_a_only.html ]]; then
            mv dashboard/index_a_only.html dashboard/_site/index.html
          elif [[ -f dashboard/_site/index_a_only.html ]]; then
            mv dashboard/_site/index_a_only.html dashboard/_site/index.html
          fi
          ls -la dashboard/_site/

      # ----------------------------------------------------------------- Deploy
      - name: Publish dashboard
        if: steps.gate.outputs.run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard/_site
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Dashboard update for ${{ github.run_id }}"

      # ------------------------------------------------------ Persist fits
      # Cron path only refits A — only that fit and the current stan_data
      # are uploaded. fit_B / fit_C are not produced on the runner.
      - name: Upload fit_A as workflow artefact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mct-fits-${{ github.run_id }}
          path: |
            outputs/draws/fit_A.rds
            outputs/draws/fit_A_prior.rds
            outputs/draws/stan_data.rds
            outputs/draws/stan_data_prior.rds
          retention-days: 90
          if-no-files-found: ignore
