project:
  type: default
  output-dir: _site

execute:
  freeze: false
  echo: false
  warning: false
  message: false

format:
  html:
    theme: [default, styles.scss]
    toc: true
    toc-location: right
    toc-depth: 2
    fig-width: 9
    fig-height: 4
    fig-format: retina
    code-tools: false
    embed-resources: false
    page-layout: article
    mainfont: "Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
